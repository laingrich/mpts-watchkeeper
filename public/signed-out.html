<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Signed out | MPTS Watchkeeper</title>

    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e5e7eb;
        background: #0b1120;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top right,
            rgba(37, 99, 235, 0.22),
            transparent 35%
          ),
          #0b1120;
      }

      main {
        width: min(520px, 100%);
        padding: 42px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        background: rgba(17, 24, 39, 0.82);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      }

      .eyebrow {
        margin-bottom: 10px;
        color: #60a5fa;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.14em;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.3rem;
      }

      p {
        margin: 0 0 28px;
        color: #9ca3af;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 11px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <main>
      <div class="eyebrow">
        MP TECHNICAL SERVICES · WATCHKEEPER
      </div>

      <h1>Signed out</h1>

      <p>
        Your Watchkeeper session has ended. You can safely close this
        window or sign in again.
      </p>

      <a href="/login">
        Sign in again
      </a>
    </main>
  </body>
</html>
